<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rembg – Remove Background</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #2c2c2c;
      color: #e0e0e0;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      color: #aaa;
    }

    input[type="text"],
    input[type="number"],
    input[type="color"] {
      background: #3a3a3a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 13px;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      outline: none;
      border-color: #6ea8fe;
    }

    input[type="number"] {
      width: 80px;
    }

    .section {
      border-top: 1px solid #444;
      padding-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .inline-field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .inline-field label {
      font-size: 13px;
      color: #ccc;
      flex-shrink: 0;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .color-row input[type="color"] {
      width: 32px;
      height: 28px;
      padding: 2px;
      cursor: pointer;
    }

    .collapsible {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }

    .collapsible.open {
      max-height: 500px;
    }

    select {
      background: #3a3a3a;
      border: 1px solid #555;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 13px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-row label {
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      user-select: none;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #555;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked + .slider {
      background: #4a7eff;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(16px);
    }

    button {
      background: #4a7eff;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) {
      background: #3a6aee;
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
    }

    #status {
      font-size: 12px;
      color: #aaa;
      min-height: 18px;
    }

    #status.error {
      color: #ff6b6b;
    }

    #status.success {
      color: #69db7c;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #666;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <h2>🪄 Remove Background</h2>

  <div class="field">
    <label for="model">Model</label>
    <select id="model">
      <option value="u2net" selected>u2net (general purpose)</option>
      <option value="u2netp">u2netp (lightweight)</option>
      <option value="u2net_human_seg">u2net_human_seg (people)</option>
      <option value="u2net_cloth_seg">u2net_cloth_seg (clothing)</option>
      <option value="isnet-general-use">isnet-general-use</option>
      <option value="isnet-anime">isnet-anime</option>
      <option value="silueta">silueta</option>
      <option value="birefnet-general">birefnet-general</option>
      <option value="birefnet-general-lite">birefnet-general-lite</option>
      <option value="birefnet-portrait">birefnet-portrait</option>
      <option value="birefnet-dis">birefnet-dis</option>
      <option value="birefnet-hrsod">birefnet-hrsod</option>
      <option value="birefnet-cod">birefnet-cod (camouflaged)</option>
      <option value="birefnet-massive">birefnet-massive</option>
      <option value="bria-rmbg">bria-rmbg</option>
    </select>
  </div>

  <div class="field">
    <label for="mode">Apply to</label>
    <select id="mode">
      <option value="layer">Active Layer</option>
      <option value="document">Entire Document</option>
    </select>
  </div>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="mask-mode" checked>
      <span class="slider"></span>
    </label>
    <label for="mask-mode">Mask mode (apply as layer mask)</label>
  </div>

  <!-- Advanced Options -->
  <div class="section">
    <span class="section-title">Advanced</span>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="post-process" checked>
      <span class="slider"></span>
    </label>
    <label for="post-process">Post-process mask (smoother edges)</label>
  </div>

  <!-- Alpha Matting -->
  <div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="alpha-matting" onchange="document.getElementById('am-options').classList.toggle('open', this.checked)">
        <span class="slider"></span>
      </label>
      <label for="alpha-matting">Alpha matting (refine edges)</label>
    </div>
    <div id="am-options" class="collapsible">
      <div class="inline-field" style="margin-top:6px">
        <label for="am-fg">Foreground threshold</label>
        <input type="number" id="am-fg" value="240" min="0" max="255">
      </div>
      <div class="inline-field" style="margin-top:4px">
        <label for="am-bg">Background threshold</label>
        <input type="number" id="am-bg" value="10" min="0" max="255">
      </div>
      <div class="inline-field" style="margin-top:4px">
        <label for="am-erode">Erode size</label>
        <input type="number" id="am-erode" value="10" min="0" max="100">
      </div>
    </div>
  </div>

  <!-- Background Color -->
  <div>
    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="bgcolor-enable" onchange="document.getElementById('bgcolor-options').classList.toggle('open', this.checked)">
        <span class="slider"></span>
      </label>
      <label for="bgcolor-enable">Replace background with color</label>
    </div>
    <div id="bgcolor-options" class="collapsible">
      <div class="color-row" style="margin-top:6px">
        <input type="color" id="bgcolor-picker" value="#ffffff">
        <label style="font-size:13px;color:#ccc">Background color</label>
      </div>
    </div>
  </div>

  </div>

  <button id="btn-remove" onclick="removeBackground()">Remove Background</button>

  <div id="status"></div>

  <script>
    // ── Photopea communication layer ──────────────────────────
    // Based on yikuansun/PhotopeaAPI patterns.
    //
    // From inside a plugin iframe, window.parent is the Photopea window.
    // postMessage(scriptString) runs a script; Photopea replies with
    // zero or more data messages followed by a final "done" string.
    // postMessage(ArrayBuffer) loads a file (image, brush, font, etc.)
    // and Photopea replies with "done" when finished.

    const pea = window.parent;

    /**
     * Small delay — avoids race conditions when chaining commands.
     */
    function pause(ms = 30) {
      return new Promise(r => setTimeout(r, ms));
    }

    /**
     * Run a Photopea script string. Returns an array of all outputs
     * Photopea sent before the final "done".
     */
    function runScript(script) {
      return new Promise((resolve) => {
        const outputs = [];
        function handler(e) {
          // Only handle messages from the Photopea parent window
          if (e.source !== pea) return;
          if (e.data === "done") {
            window.removeEventListener("message", handler);
            resolve(outputs);
          } else {
            outputs.push(e.data);
          }
        }
        window.addEventListener("message", handler);
        pea.postMessage(script, "*");
      });
    }

    /**
     * Send an ArrayBuffer to Photopea (opens it as a new document).
     * Waits for "done".
     */
    function loadAsset(arrayBuffer) {
      return new Promise((resolve) => {
        function handler(e) {
          if (e.source !== pea) return;
          if (e.data === "done") {
            window.removeEventListener("message", handler);
            resolve();
          }
        }
        window.addEventListener("message", handler);
        pea.postMessage(arrayBuffer, "*");
      });
    }

    /**
     * Export the active document as PNG. Returns an ArrayBuffer.
     * Retries if Photopea returns only "done" without data (can happen).
     */
    async function exportPNG() {
      let buffer = null;
      for (let attempt = 0; attempt < 5; attempt++) {
        await pause();
        const data = await runScript('app.activeDocument.saveToOE("png");');
        // The ArrayBuffer is typically the first item; "done" has already
        // been stripped by runScript, but sometimes the array is empty
        // if Photopea wasn't ready yet.
        buffer = data.find(d => d instanceof ArrayBuffer);
        if (buffer) return buffer;
        await pause(200);
      }
      throw new Error("Failed to export image from Photopea (no ArrayBuffer received after retries)");
    }

    // ── Main action ──────────────────────────────────────────

    async function removeBackground() {
      const btn = document.getElementById("btn-remove");
      const status = document.getElementById("status");
      // Use same origin — backend and plugin are served from the same server
      const serverUrl = window.location.origin;
      const mode = document.getElementById("mode").value;
      const maskMode = document.getElementById("mask-mode").checked;
      const model = document.getElementById("model").value;
      const postProcess = document.getElementById("post-process").checked;
      const alphaMatting = document.getElementById("alpha-matting").checked;
      const amFg = document.getElementById("am-fg").value;
      const amBg = document.getElementById("am-bg").value;
      const amErode = document.getElementById("am-erode").value;
      const bgcolorEnabled = document.getElementById("bgcolor-enable").checked;
      const bgcolorHex = document.getElementById("bgcolor-picker").value;

      btn.disabled = true;
      status.className = "";
      status.innerHTML = '<span class="spinner"></span> Exporting image from Photopea…';

      try {
        // ── Step 1: Remember the original document name ──
        const nameResult = await runScript('app.echoToOE(app.activeDocument.name);');
        const origDocName = nameResult[0];

        // Also remember the active layer name/index for mask mode
        let origLayerName = null;
        if (maskMode) {
          const layerResult = await runScript('app.echoToOE(app.activeDocument.activeLayer.name);');
          origLayerName = layerResult[0];
        }

        // ── Step 2: If "layer" mode, isolate the active layer into a temp doc ──
        if (mode === "layer") {
          // Duplicate the layer into a new transparent document
          await runScript(`
            var doc = app.activeDocument;
            var layer = doc.activeLayer;
            var tmpDoc = app.documents.add(doc.width, doc.height, doc.resolution, "rembg_tmp");
            app.activeDocument = tmpDoc;
            tmpDoc.activeLayer.remove();
            app.activeDocument = doc;
            layer.duplicate(tmpDoc, ElementPlacement.INSIDE);
            app.activeDocument = tmpDoc;
          `);
        }

        // ── Step 3: Export as PNG ──
        const pngBuffer = await exportPNG();
        const blob = new Blob([pngBuffer], { type: "image/png" });

        // Close temp doc if we made one
        if (mode === "layer") {
          await runScript('app.activeDocument.close(SaveOptions.DONOTSAVECHANGES);');
        }

        const actionLabel = maskMode ? "Generating mask" : "Removing background";
        status.innerHTML = `<span class="spinner"></span> ${actionLabel} (${(blob.size / 1024).toFixed(0)} KB)…`;

        // ── Step 4: Send to rembg server ──
        const formData = new FormData();
        formData.append("file", blob, "image.png");
        formData.append("model", model);
        formData.append("post_process_mask", postProcess);

        if (!maskMode) {
          formData.append("alpha_matting", alphaMatting);
          if (alphaMatting) {
            formData.append("alpha_matting_foreground_threshold", amFg);
            formData.append("alpha_matting_background_threshold", amBg);
            formData.append("alpha_matting_erode_size", amErode);
          }
          if (bgcolorEnabled) {
            // Convert hex #rrggbb to "r,g,b,255"
            const r = parseInt(bgcolorHex.slice(1,3), 16);
            const g = parseInt(bgcolorHex.slice(3,5), 16);
            const b = parseInt(bgcolorHex.slice(5,7), 16);
            formData.append("bgcolor", `${r},${g},${b},255`);
          }
        }

        const endpoint = maskMode ? "/api/mask" : "/api/remove";
        const resp = await fetch(`${serverUrl}${endpoint}`, {
          method: "POST",
          body: formData,
        });

        if (!resp.ok) {
          const text = await resp.text().catch(() => "");
          throw new Error(`Server error: ${resp.status} ${resp.statusText} ${text}`);
        }

        const resultBuffer = await resp.arrayBuffer();
        status.innerHTML = '<span class="spinner"></span> Loading result into Photopea…';

        if (maskMode) {
          // ── MASK MODE: Apply result as a layer mask ──
          await applyAsMask(resultBuffer, origDocName, origLayerName);
          status.className = "success";
          status.textContent = "✅ Layer mask applied!";
        } else {
          // ── NORMAL MODE: Replace with transparent result ──
          // Step 5: Load the result PNG — opens as a new document (preserves alpha)
          await loadAsset(resultBuffer);
          await pause(200);

          // Step 6: Move the layer from the new doc into the original doc
          await runScript(`
            var newDoc = app.activeDocument;
            var origDoc = null;
            for (var i = 0; i < app.documents.length; i++) {
              if (app.documents[i].name === "${origDocName.replace(/"/g, '\\"')}") {
                origDoc = app.documents[i];
                break;
              }
            }
            if (origDoc && newDoc !== origDoc) {
              newDoc.activeLayer.name = "rembg result";
              newDoc.activeLayer.duplicate(origDoc, ElementPlacement.PLACEATBEGINNING);
              newDoc.close(SaveOptions.DONOTSAVECHANGES);
              app.activeDocument = origDoc;
            } else {
              app.activeDocument.activeLayer.name = "rembg result";
            }
          `);

          status.className = "success";
          status.textContent = "✅ Background removed! New layer added.";
        }
      } catch (err) {
        console.error(err);
        status.className = "error";
        status.textContent = "❌ " + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    /**
     * Apply a grayscale mask image as a layer mask on the active layer.
     *
     * Workflow:
     *  1. Open mask PNG in Photopea (new doc)
     *  2. Select All → Copy
     *  3. Close the mask doc
     *  4. Switch back to original doc / layer
     *  5. Add a "Reveal All" raster layer mask (Photoshop ActionDescriptor)
     *  6. Target the mask channel for editing
     *  7. Paste the grayscale mask
     *  8. Deselect and return to RGB composite
     */
    async function applyAsMask(maskBuffer, origDocName, origLayerName) {
      // 1. Open the mask image in Photopea
      await loadAsset(maskBuffer);
      await pause(300);

      // 2. Select All and Copy the mask content
      await runScript(`
        app.activeDocument.selection.selectAll();
        app.activeDocument.activeLayer.copy();
      `);
      await pause(100);

      // 3. Close the mask document
      await runScript('app.activeDocument.close(SaveOptions.DONOTSAVECHANGES);');
      await pause(100);

      // 4. Ensure we're on the correct document and layer
      await runScript(`
        var origDoc = null;
        for (var i = 0; i < app.documents.length; i++) {
          if (app.documents[i].name === "${origDocName.replace(/"/g, '\\"')}") {
            origDoc = app.documents[i];
            break;
          }
        }
        if (origDoc) {
          app.activeDocument = origDoc;
        }
        // Re-select the original layer by name
        var doc = app.activeDocument;
        function findLayer(layers, name) {
          for (var j = 0; j < layers.length; j++) {
            if (layers[j].name === "${(origLayerName || '').replace(/"/g, '\\"')}") return layers[j];
            if (layers[j].layers) {
              var found = findLayer(layers[j].layers, name);
              if (found) return found;
            }
          }
          return null;
        }
        var targetLayer = findLayer(doc.layers, "${(origLayerName || '').replace(/"/g, '\\"')}");
        if (targetLayer) doc.activeLayer = targetLayer;
      `);
      await pause(100);

      // 5. Add a "Reveal All" layer mask using Photoshop-compatible ActionDescriptor
      await runScript(`
        var desc = new ActionDescriptor();
        desc.putClass(charIDToTypeID("Nw  "), charIDToTypeID("Chnl"));
        var ref = new ActionReference();
        ref.putEnumerated(charIDToTypeID("Chnl"), charIDToTypeID("Chnl"), charIDToTypeID("Msk "));
        desc.putReference(charIDToTypeID("At  "), ref);
        desc.putEnumerated(charIDToTypeID("Usng"), charIDToTypeID("UsrM"), charIDToTypeID("RvlA"));
        executeAction(charIDToTypeID("Mk  "), desc, DialogModes.NO);
      `);
      await pause(100);

      // 6. Target the mask channel for editing
      await runScript(`
        var ref = new ActionReference();
        ref.putEnumerated(charIDToTypeID("Chnl"), charIDToTypeID("Chnl"), charIDToTypeID("Msk "));
        var desc = new ActionDescriptor();
        desc.putReference(charIDToTypeID("null"), ref);
        desc.putBoolean(charIDToTypeID("MkVs"), false);
        executeAction(charIDToTypeID("slct"), desc, DialogModes.NO);
      `);
      await pause(100);

      // 7. Paste the mask content
      await runScript('app.activeDocument.paste();');
      await pause(100);

      // 8. Deselect and switch back to RGB composite
      await runScript(`
        app.activeDocument.selection.deselect();
        var ref = new ActionReference();
        ref.putEnumerated(charIDToTypeID("Chnl"), charIDToTypeID("Chnl"), charIDToTypeID("RGB "));
        var desc = new ActionDescriptor();
        desc.putReference(charIDToTypeID("null"), ref);
        executeAction(charIDToTypeID("slct"), desc, DialogModes.NO);
      `);
      await pause(100);
    }
  </script>
</body>
</html>
